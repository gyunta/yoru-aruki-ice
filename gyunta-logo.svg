  <!-- コーンの格子 -->
  <line x1="280" y1="245" x2="310" y2="245" stroke="#a07840" stroke-width="1" opacity="0.6"/>
  <line x1="277" y1="252" x2="313" y2="252" stroke="#a07840" stroke-width="1" opacity="0.6"/>
  <line x1="283" y1="238" x2="307" y2="238" stroke="#a07840" stroke-width="1" opacity="0.6"/>
  <line x1="286" y1="230" x2="304" y2="230" stroke="#a07840" stroke-width="1" opacity="0.6"/>
  <line x1="289" y1="222" x2="301" y2="222" stroke="#a07840" stroke-width="1" opacity="0.6"/>
  <!-- ジェラートスクープ1 -->
  <ellipse cx="295" cy="190" rx="22" ry="20" fill="#1D9E75"/>
  <!-- ジェラートスクープ2 -->
  <ellipse cx="300" cy="172" rx="18" ry="17" fill="#9FCFC0"/>
