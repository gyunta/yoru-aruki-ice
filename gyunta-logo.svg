  <polygon points="133,182 120,152 152,172" fill="#8a90a8"/>
  <polygon points="135,180 124,157 150,172" fill="#d4a0a8"/>
  <polygon points="195,178 195,150 215,172" fill="#8a90a8"/>
  <polygon points="196,177 197,155 212,172" fill="#d4a0a8"/>

