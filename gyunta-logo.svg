  <line x1="140" y1="222" x2="98" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <line x1="140" y1="226" x2="100" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="192" y1="218" x2="230" y2="212" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
  <line x1="192" y1="222" x2="232" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="192" y1="226" x2="230" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.7"/>

