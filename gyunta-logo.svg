  <circle cx="350" cy="300" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="120" cy="100" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="310" cy="150" r="1" fill="#ffffff" opacity="0.4"/>

  <!-- ぎゅん太 本体（ごろ寝ポーズ） -->

  <!-- 胴体 -->
  <ellipse cx="200" cy="265" rx="80" ry="38" fill="#7a8098"/>
  <!-- 胴体の縞 -->
  <ellipse cx="185" cy="258" rx="12" ry="28" fill="#6a7088" opacity="0.5"/>
