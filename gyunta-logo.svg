  <!-- 左目 -->
  <ellipse cx="153" cy="205" rx="13" ry="14" fill="#c8d420"/>
  <ellipse cx="153" cy="205" rx="10" ry="11" fill="#8aaa10"/>
  <ellipse cx="153" cy="205" rx="7" ry="9" fill="#1a1f2e"/>
  <ellipse cx="149" cy="201" rx="2.5" ry="3" fill="#ffffff" opacity="0.9"/>
