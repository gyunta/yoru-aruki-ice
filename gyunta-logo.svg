  <text x="200" y="340" text-anchor="middle" font-family="serif" font-size="22" font-weight="500" fill="#f0ede6" letter-spacing="4">夜散歩アイス</text>
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9FCFC0" letter-spacing="3">YORU ARUKI ICE</text>

  <!-- 月 -->
  <circle cx="320" cy="90" r="18" fill="#f5e090" opacity="0.9"/>
  <circle cx="328" cy="84" r="15" fill="#0d1117"/>

  <!-- 川の波線（下部） -->
  <path d="M40 385 Q80 378 120 385 Q160 392 200 383 Q240 375 280 383 Q320 391 360 383" stroke="#1D9E75" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M40 390 Q80 383 120 390 Q160 397 200 388 Q240 380 280 388 Q320 396 360 388" stroke="#1a3a5c" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>

</svg>
