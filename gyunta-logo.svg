  <path d="M275 265 Q310 240 320 220 Q325 205 315 200" stroke="#7a8098" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M275 265 Q310 240 320 220 Q325 205 315 200" stroke="#6a7088" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

