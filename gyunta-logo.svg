  <path d="M155 175 Q158 165 162 175" stroke="#6a7088" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M168 172 Q171 162 174 172" stroke="#6a7088" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M181 175 Q184 165 187 175" stroke="#6a7088" stroke-width="2.5" fill="none" stroke-linecap="round"/>

